name: Publish
on:
    workflow_dispatch:
        inputs:
            run_id:
                description: The Run ID containing the artifact
                required: true
                type: string
permissions:
    contents: read
    pages: write
    id-token: write
concurrency:
    group: "pages"
    cancel-in-progress: true
jobs:
    publish:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Download Artifact
              uses: actions/download-artifact@v7
              with:
                  name: TypeDuck-Web
                  run-id: ${{ inputs.run_id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
            - name: Uncompress and Move
              run: |
                  tar -xvf TypeDuck-Web.tar
                  mkdir root
                  mv TypeDuck-Web root/${{ github.ref_name }}
            - name: Upload Pages Artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: "./root"
            - name: Deploy to GitHub Pages
              uses: actions/deploy-pages@v5
